<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluesky RSS</title>
    <link rel="stylesheet" href="/styles.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Bsky<span class="accent">RSS</span>.com</h1>
      <p>Generate beautiful RSS and JSON feeds from Bluesky profiles</p>
    </header>

    <main>
      <form id="form">
        <div class="bar">
          <input
            type="text"
            id="handle"
            placeholder="Bluesky handle, DID, or profile URL"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            required
          />
          <button type="submit">Get Feeds</button>
        </div>
        <div class="labels">
          <label>
            <span class="toggle">
              <input type="checkbox" id="includeReposts" />
              <span class="slider"></span>
            </span>
            Include reposts
          </label>
          <label>
            <span class="toggle">
              <input type="checkbox" id="includeReplies" />
              <span class="slider"></span>
            </span>
            Include replies
          </label>
        </div>
      </form>

      <div id="error"></div>
      <div id="result"></div>
    </main>

    <script>
      function copyUrl(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
          btn.textContent = "Copied!";
          setTimeout(() => {
            btn.textContent = "Copy";
          }, 1500);
        });
      }

      const form = document.getElementById("form");
      const handleInput = document.getElementById("handle");
      const resultDiv = document.getElementById("result");
      const errorDiv = document.getElementById("error");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        resultDiv.innerHTML = "";
        errorDiv.textContent = "";

        let input = handleInput.value.trim().replace(/^@/, "");
        if (!input) return;

        // Extract handle or DID from a Bluesky profile URL
        const profileUrlMatch = input.match(
          /^https?:\/\/bsky\.app\/profile\/([^/?#]+)/,
        );
        if (profileUrlMatch) {
          input = profileUrlMatch[1];
        }

        try {
          let did;
          if (input.startsWith("did:")) {
            did = input;
          } else {
            const res = await fetch(
              `https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${encodeURIComponent(input)}`,
            );
            if (!res.ok) {
              throw new Error(
                "Could not resolve handle. Check that it's correct.",
              );
            }
            const data = await res.json();
            did = data.did;
          }
          const base = window.location.origin;
          const params = new URLSearchParams();
          if (document.getElementById("includeReposts").checked) {
            params.set("includeReposts", "true");
          }
          if (document.getElementById("includeReplies").checked) {
            params.set("includeReplies", "true");
          }
          const qs = params.toString() ? `?${params.toString()}` : "";

          const atomUrl = `${base}/${did}.xml${qs}`;
          const jsonUrl = `${base}/${did}.json${qs}`;

          resultDiv.innerHTML = `
						<div class="feed">
              <p>JSON feed (<a href="https://www.jsonfeed.org/2017/05/17/announcing-json-feed.html">what is a JSON feed?</a>):<p>
							<p class="url">${jsonUrl}</p>
							<button onclick="copyUrl('${jsonUrl}', this)">Copy</button>
						</div>
						<div class="feed">
              <p>RSS (Atom) feed:<p>
							<p class="url">${atomUrl}</p>
							<button onclick="copyUrl('${atomUrl}', this)">Copy</button>
						</div>
					`;
        } catch (err) {
          errorDiv.textContent = err.message;
        }
      });
    </script>
  </body>
</html>
