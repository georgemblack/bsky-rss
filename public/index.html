<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluesky RSS</title>
    <link rel="stylesheet" href="/styles.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crete+Round&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Bsky<span class="accent">RSS</span></h1>
    <p>Generate Atom and JSON feeds from Bluesky profiles.</p>

    <form id="form">
      <input
        type="text"
        id="handle"
        placeholder="handle (e.g. george.black)"
        required
      />
      <label
        ><input type="checkbox" id="includeReposts" /> Include reposts</label
      >
      <label
        ><input type="checkbox" id="includeReplies" /> Include replies</label
      >
      <button type="submit">Get Feeds</button>
    </form>

    <div id="error"></div>
    <div id="result"></div>

    <script>
      function copyUrl(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
          btn.textContent = "Copied!";
          setTimeout(() => {
            btn.textContent = "Copy";
          }, 1500);
        });
      }

      const form = document.getElementById("form");
      const handleInput = document.getElementById("handle");
      const resultDiv = document.getElementById("result");
      const errorDiv = document.getElementById("error");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        resultDiv.innerHTML = "";
        errorDiv.textContent = "";

        const handle = handleInput.value.trim().replace(/^@/, "");
        if (!handle) return;

        try {
          const res = await fetch(
            `https://public.api.bsky.app/xrpc/com.atproto.identity.resolveHandle?handle=${encodeURIComponent(handle)}`,
          );
          if (!res.ok) {
            throw new Error(
              "Could not resolve handle. Check that it's correct.",
            );
          }
          const data = await res.json();
          const did = data.did;
          const base = window.location.origin;
          const params = new URLSearchParams();
          if (document.getElementById("includeReposts").checked) {
            params.set("includeReposts", "true");
          }
          if (document.getElementById("includeReplies").checked) {
            params.set("includeReplies", "true");
          }
          const qs = params.toString() ? `?${params.toString()}` : "";

          const atomUrl = `${base}/${did}.xml${qs}`;
          const jsonUrl = `${base}/${did}.json${qs}`;

          resultDiv.innerHTML = `
						<p><strong>Feeds for ${handle}:</strong></p>
						<div class="feed-row">
							<code>${atomUrl}</code>
							<button onclick="copyUrl('${atomUrl}', this)">Copy</button>
						</div>
						<div class="feed-row">
							<code>${jsonUrl}</code>
							<button onclick="copyUrl('${jsonUrl}', this)">Copy</button>
						</div>
					`;
        } catch (err) {
          errorDiv.textContent = err.message;
        }
      });
    </script>
  </body>
</html>
